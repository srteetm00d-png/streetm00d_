<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>STREETMOOD | Premium Streetwear & Sneakers</title>
    <link rel="manifest" href="manifest.json">
    <script src="sw.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #000000;
            --bg-card: #111827;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --border: #374151;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.7);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .fav-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .fav-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .fav-count {
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(239,68,68,0.1) 0%, transparent 50%);
        }

        .hero-content {
            max-width: 800px;
            animation: fadeInUp 1s ease;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -3px;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .hero-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .section {
            padding: 5rem 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .category-filters {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .cat-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .cat-btn:hover {
            border-color: var(--accent);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        .img-container {
            position: relative;
            height: 300px;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .img-container img {
            transform: scale(1.05);
        }

        .heart-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(239,68,68,0.9);
            color: white;
            padding: 0.5rem;
            border-radius: 50%;
            font-size: 0.8rem;
            z-index: 10;
        }

        .card-fav-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .card-fav-btn:hover {
            background: var(--accent);
        }

        .card-info {
            padding: 1.5rem;
        }

        .card-info h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .card-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .card-size {
            font-size: 0.9rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            display: inline-block;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 2rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        .modal-body {
            padding: 2rem;
        }

        .modal-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .modal-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .modal-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .modal-size {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-action {
            flex: 1;
            min-width: 200px;
            padding: 1rem;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .reserve {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .reserve:hover {
            background: var(--bg-dark);
            border-color: var(--accent);
        }

        .buy {
            background: var(--accent);
            color: white;
        }

        .buy:hover {
            background: var(--accent-hover);
        }

        .empty-fav {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .item-count {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .reveal {
            animation: fadeInUp 0.6s ease forwards;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 3rem;
            }
            
            .product-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 1rem;
            }
            
            .modal {
                padding: 1rem;
            }
            
            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">STREET<span>MOOD</span></div>
                <div class="header-actions">
                    <button class="fav-btn" id="fav-btn">
                        <span class="icon-heart"></span>
                        <span class="fav-count" id="fav-count">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h1>STREET<span>MOOD</span></h1>
                    <p>Premium Streetwear & Sneakers Collection</p>
                    <div class="hero-actions">
                        <a href="#products" class="btn btn-primary">Explorar Coleção</a>
                        <a href="https://instagram.com/streetm00d_" target="_blank" class="btn btn-secondary">Contato</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="section" id="products">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Coleção Premium</h2>
                    <div class="category-filters">
                        <button class="cat-btn active" data-category="all">Todos</button>
                        <button class="cat-btn" data-category="sneakers">Sneakers</button>
                        <button class="cat-btn" data-category="roupas">Roupas</button>
                    </div>
                </div>
                
                <div class="item-count" id="item-count">Carregando...</div>
                
                <div class="product-grid" id="product-grid">
                    <!-- Products will be loaded here -->
                </div>
                
                <div class="empty-fav" id="empty-fav" style="display: none;">
                    <h3>Nenhum produto encontrado</h3>
                    <p>Tente alterar os filtros ou volte mais tarde.</p>
                </div>
            </div>
        </section>
    </main>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="logo">STREET<span>MOOD</span></div>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let currentProducts = [];
        let favorites = new Set();
        let currentCategory = 'all';

        // Load data
        async function loadData() {
            try {
                const response = await fetch('products.json');
                const data = await response.json();
                products = Object.values(data);
                
                // Add category to products if not present
                products.forEach(product => {
                    if (!product.category) {
                        product.category = 'sneaker';
                    }
                });
                
                currentProducts = [...products];
                updateItemCount();
                renderProducts();
            } catch (error) {
                console.error('Error loading products:', error);
                // Fallback products
                products = [
                    { name: "Air Jordan 1", price: 90, size: "40-45", images: ["streetm00d_.jpeg"], category: "sneaker" },
                    { name: "Nike Air Max", price: 85, size: "N/A", images: ["streetm00d_.jpeg"], category: "sneaker" },
                    { name: "SynaWord Hoodie", price: 90, size: "N/A", images: ["streetm00d_.jpeg"], category: "roupa" }
                ];
                currentProducts = [...products];
                updateItemCount();
                renderProducts();
            }
        }

        // Render products
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const emptyFav = document.getElementById('empty-fav');
            
            const filteredProducts = currentCategory === 'all' 
                ? currentProducts 
                : currentProducts.filter(p => p.category === currentCategory);
            
            if (filteredProducts.length === 0) {
                grid.innerHTML = '';
                emptyFav.style.display = 'block';
                return;
            }
            
            emptyFav.style.display = 'none';
            
            grid.innerHTML = filteredProducts.map(product => {
                const firstImage = product.images && product.images.length > 0 
                    ? product.images[0] 
                    : 'streetm00d_.jpeg';
                    
                return `
                    <div class="card" onclick="openModal('${product.id}')">
                        <div class="img-container">
                            <img src="imagens_produtos/${firstImage}" alt="${product.name}" 
                                 onerror="this.src='streetm00d_.jpeg'">
                            ${product.images && product.images.length > 1 ? '<div class="heart-badge">❤️</div>' : ''}
                            <button class="card-fav-btn" onclick="toggleFavorite(event, '${product.id}')">
                                <span class="${favorites.has(product.id) ? 'icon-heart' : 'icon-heart-outline'}"></span>
                            </button>
                        </div>
                        <div class="card-info">
                            <h3>${product.name}</h3>
                            <div class="card-price">€ ${product.price}</div>
                            ${product.size && product.size.toUpperCase() !== "N/A" 
                                ? `<div class="card-size">${product.size}</div>` 
                                : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            // Add reveal animation
            setTimeout(() => {
                document.querySelectorAll('.card').forEach((card, index) => {
                    setTimeout(() => card.classList.add('reveal'), index * 100);
                });
            }, 100);
        }

        // Category filters
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                currentCategory = this.dataset.category;
                renderProducts();
                updateItemCount();
            });
        });

        // Favorites
        function loadFavorites() {
            const saved = localStorage.getItem('streetmood_favorites');
            if (saved) {
                favorites = new Set(JSON.parse(saved));
            }
            updateFavCount();
        }

        function saveFavorites() {
            localStorage.setItem('streetmood_favorites', JSON.stringify([...favorites]));
        }

        function toggleFavorite(event, productId) {
            event.stopPropagation();
            
            if (favorites.has(productId)) {
                favorites.delete(productId);
            } else {
                favorites.add(productId);
            }
            
            saveFavorites();
            updateFavCount();
            renderProducts();
        }

        function updateFavCount() {
            const count = document.getElementById('fav-count');
            count.textContent = favorites.size;
        }

        function updateItemCount() {
            const count = document.getElementById('item-count');
            const filteredCount = currentCategory === 'all' 
                ? currentProducts.length 
                : currentProducts.filter(p => p.category === currentCategory).length;
            count.textContent = `${filteredCount} produtos`;
        }

        // Modal
        function openModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modal-body');
            
            const images = product.images || ['streetm00d_.jpeg'];
            const currentImage = images[0];
            
            modalBody.innerHTML = `
                <img src="imagens_produtos/${currentImage}" alt="${product.name}" 
                     class="modal-image" onerror="this.src='streetm00d_.jpeg'">
                <h2 class="modal-name">${product.name}</h2>
                <div class="modal-price">€ ${product.price}</div>
                ${product.size && product.size.toUpperCase() !== "N/A" 
                    ? `<div class="modal-size">Tamanhos: ${product.size}</div>` 
                    : ''}
                <div class="modal-actions">
                    <a href="https://instagram.com/streetm00d_" target="_blank" class="btn-action reserve">
                        Reservar
                    </a>
                    <a href="https://instagram.com/streetm00d_" target="_blank" class="btn-action buy">
                        Comprar Agora
                    </a>
                </div>
            `;
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Favorites button
        document.getElementById('fav-btn').addEventListener('click', function() {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            currentCategory = 'favorites';
            renderProducts();
            updateItemCount();
        });

        // Close modal on outside click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize
        loadFavorites();
        loadData();
    </script>
</body>
</html>
