<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>STREETMOOD | Performance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg: #090c10;
            --card: #161b22;
            --text: #ffffff;
            --text-muted: #8b949e;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ff3e3e;
            --skeleton: #21262d;
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --card: #ffffff;
            --text: #1f2328;
            --text-muted: #656d76;
            --border: rgba(0, 0, 0, 0.1);
            --skeleton: #ebedef;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        /* --- Header & Luxury Glass --- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
            background: rgba(var(--bg), 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; letter-spacing: -1px; font-size: 1.2rem; }
        .logo span { color: var(--accent); }

        .nav-tools { display: flex; gap: 15px; align-items: center; }
        .icon-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text); position: relative; }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; }

        /* --- Hero --- */
        .hero { padding: 40px 20px; }
        .hero h1 { font-size: 2.5rem; margin: 0; font-weight: 800; line-height: 1; }
        .hero p { color: var(--text-muted); margin-top: 10px; }

        /* --- Advanced Filters --- */
        .filter-section {
            position: sticky;
            top: 70px;
            z-index: 900;
            background: var(--bg);
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .search-bar {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }

        .scroll-chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .scroll-chips::-webkit-scrollbar { display: none; }

        .chip {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }
        .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        /* --- Product Grid & Skeleton --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 10px;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeIn 0.4s ease forwards;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .fav-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            color: white;
            backdrop-filter: blur(5px);
        }
        .fav-btn.active { color: var(--accent); }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 15px;
            background: var(--skeleton);
            overflow: hidden;
            margin-bottom: 10px;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Skeleton Animation */
        .skeleton {
            background: var(--skeleton);
            background: linear-gradient(90deg, var(--skeleton) 25%, var(--border) 50%, var(--skeleton) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Modal & Zoom --- */
        #modal {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 60vh; }
        .slider img { flex: 0 0 100%; scroll-snap-align: center; object-fit: cover; }
        
        .dots { display: flex; justify-content: center; gap: 5px; margin-top: -30px; z-index: 10; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); }
        .dot.active { width: 15px; background: white; }

        .modal-body { padding: 30px 20px; flex-grow: 1; }
        .modal-footer { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid var(--border); }

        /* Sentinel for Infinite Scroll */
        #sentinel { height: 50px; width: 100%; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">STREET<span>MOOD</span></div>
        <div class="nav-tools">
            <button class="icon-btn" onclick="toggleTheme()">🌓</button>
            <button class="icon-btn" onclick="showFavorites()">
                ❤️ <span class="badge" id="fav-count">0</span>
            </button>
        </div>
    </header>

    <main id="home-view">
        <section class="hero">
            <h1>SNEAKER<br>CULTURE.</h1>
            <p>Premium selection for collectors.</p>
        </section>

        <div class="filter-section">
            <input type="text" id="main-search" class="search-bar" placeholder="Ex: Jordan 4, Nike, 42...">
            <div class="scroll-chips" id="brand-filters"></div>
            <div class="scroll-chips" id="size-filters"></div>
        </div>

        <div class="grid" id="main-grid"></div>
        <div id="sentinel"></div>
    </main>

    <!-- Modal Detail -->
    <div id="modal">
        <div style="padding: 20px; display: flex; justify-content: flex-end;">
            <button class="icon-btn" onclick="closeModal()" style="font-size: 2rem;">&times;</button>
        </div>
        <div class="slider" id="m-slider"></div>
        <div class="dots" id="m-dots"></div>
        <div class="modal-body">
            <h2 id="m-title" style="margin:0"></h2>
            <div id="m-price" style="color:var(--accent); font-size: 1.5rem; font-weight: 800; margin: 10px 0;"></div>
            <p id="m-sizes" style="color:var(--text-muted)"></p>
        </div>
        <div class="modal-footer">
            <button class="chip" style="padding: 15px;" onclick="contact('RESERVAR')">Reservar</button>
            <button class="chip active" style="padding: 15px;" onclick="contact('COMPRAR')">Comprar Agora</button>
        </div>
    </div>

    <script>
        // --- State Management ---
        let allProducts = [];
        let filteredProducts = [];
        let displayedProducts = [];
        let favorites = JSON.parse(localStorage.getItem('sm_favs')) || [];
        let currentPage = 1;
        const perPage = 20;
        const WHATSAPP = "351912345678";

        // --- Data Fetching ---
        async function loadData() {
            try {
                const response = await fetch('produtos.tsv');
                const text = await response.text();
                processTSV(text);
                updateUI();
            } catch (e) {
                console.error("Erro ao carregar produtos.tsv. Verifique se o arquivo existe.");
            }
        }

        function processTSV(data) {
            const lines = data.split('\n');
            const grouped = {};

            lines.forEach(line => {
                const parts = line.split('\t');
                if (parts.length < 4) return;
                const [nome, tamanhos, preco, imagem] = parts;
                
                if (!grouped[nome]) {
                    grouped[nome] = { 
                        name: nome.trim(), 
                        sizes: tamanhos.trim(), 
                        price: preco.trim(), 
                        images: [] 
                    };
                }
                grouped[nome].images.push(`imagens_produtos/${imagem.trim()}`);
            });

            allProducts = Object.values(grouped);
            filteredProducts = [...allProducts];
            generateFilters();
        }

        // --- Render Engine (Infinite Scroll) ---
        function updateUI() {
            displayedProducts = filteredProducts.slice(0, perPage * currentPage);
            renderGrid();
            updateFavCount();
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            if (currentPage === 1) grid.innerHTML = '';

            displayedProducts.slice((currentPage - 1) * perPage).forEach(p => {
                const isFav = favorites.includes(p.name);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${p.name}')">
                        ${isFav ? '❤️' : '🤍'}
                    </button>
                    <div class="img-box" onclick="openProduct('${p.name}')">
                        <img src="${p.images[0]}" loading="lazy">
                    </div>
                    <div onclick="openProduct('${p.name}')">
                        <h3 style="font-size: 0.8rem; margin:0; height: 32px; overflow:hidden;">${p.name}</h3>
                        <div style="color:var(--accent); font-weight:800; margin: 5px 0;">€${p.price}</div>
                        <div style="font-size:0.6rem; color:var(--text-muted)">TAM: ${p.sizes}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Infinite Scroll Observer ---
        const observer = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && displayedProducts.length < filteredProducts.length) {
                currentPage++;
                updateUI();
            }
        }, { threshold: 0.5 });
        observer.observe(document.getElementById('sentinel'));

        // --- Filters ---
        function generateFilters() {
            const brands = ['Nike', 'Jordan', 'Adidas', 'Louis Vuitton', 'Dior', 'Gucci', 'Yeezy'];
            const sizes = [...new Set(allProducts.map(p => p.sizes.split(/[- ,/]+/)).flat())]
                            .filter(s => !isNaN(s) && s !== "").sort();

            const bContainer = document.getElementById('brand-filters');
            bContainer.innerHTML = `<div class="chip active" onclick="filterBrand('all', this)">Todos</div>` +
                brands.map(b => `<div class="chip" onclick="filterBrand('${b}', this)">${b}</div>`).join('');

            const sContainer = document.getElementById('size-filters');
            sContainer.innerHTML = sizes.map(s => `<div class="chip" onclick="filterSize('${s}', this)">${s}</div>`).join('');
        }

        function filterBrand(brand, el) {
            document.querySelectorAll('#brand-filters .chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentPage = 1;
            filteredProducts = brand === 'all' ? allProducts : allProducts.filter(p => p.name.includes(brand));
            updateUI();
        }

        function filterSize(size, el) {
            document.querySelectorAll('#size-filters .chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentPage = 1;
            filteredProducts = allProducts.filter(p => p.sizes.includes(size));
            updateUI();
        }

        // --- Search ---
        document.getElementById('main-search').addEventListener('input', debounce(e => {
            const query = e.target.value.toLowerCase();
            currentPage = 1;
            filteredProducts = query ? allProducts.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.sizes.includes(query) || 
                p.price.includes(query)
            ) : [...allProducts];
            updateUI();
        }, 300));

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // --- Interaction Functions ---
        function toggleFav(e, name) {
            e.stopPropagation();
            if (favorites.includes(name)) favorites = favorites.filter(f => f !== name);
            else favorites.push(name);
            localStorage.setItem('sm_favs', JSON.stringify(favorites));
            updateUI();
        }

        function updateFavCount() {
            document.getElementById('fav-count').innerText = favorites.length;
        }

        function showFavorites() {
            currentPage = 1;
            filteredProducts = allProducts.filter(p => favorites.includes(p.name));
            updateUI();
        }

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        }

        let currentP = null;
        function openProduct(name) {
            currentP = allProducts.find(p => p.name === name);
            document.getElementById('m-title').innerText = currentP.name;
            document.getElementById('m-price').innerText = `€${currentP.price}`;
            document.getElementById('m-sizes').innerText = `Tamanhos: ${currentP.sizes}`;
            
            const slider = document.getElementById('m-slider');
            slider.innerHTML = currentP.images.map(img => `<img src="${img}">`).join('');
            
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function contact(type) {
            const msg = `Olá STREETMOOD 👟%0A%0AQuero ${type}:%0A*${currentP.name}*%0AValor: €${currentP.price}%0ATamanho: ${currentP.sizes}`;
            window.open(`https://wa.me/${WHATSAPP}?text=${msg}`, '_blank');
        }

        // Iniciar
        loadData();
    </script>
</body>
</html>
