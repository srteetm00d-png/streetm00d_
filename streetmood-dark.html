<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREETMOOD - Dark Streetwear Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-base: #030305;
            --glass-bg: rgba(20, 20, 25, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-highlight: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #888899;
            --accent: #c6ff00;
            --accent-hover: #e0ff4d;
            --accent-glow: rgba(198, 255, 0, 0.2);
            --brand-purple: #7000ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* Ambient Background */
        .ambient-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(150px);
            z-index: 0;
            opacity: 0.5;
            animation: float 25s infinite ease-in-out alternate;
            pointer-events: none;
        }
        .blob-1 { top: -20%; left: -10%; width: 60vw; height: 60vw; background: var(--brand-purple); }
        .blob-2 { bottom: -20%; right: -10%; width: 70vw; height: 70vw; background: #000000; animation-delay: -5s; }
        .blob-3 { top: 30%; left: 40%; width: 50vw; height: 50vw; background: #11111a; animation-delay: -10s; }
        
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 5vh) scale(1.1); }
        }

        /* Layout */
        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            padding: 1.5rem 5%;
            background: rgba(3, 3, 5, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            gap: 2rem;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::after {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(198, 255, 0, 0.3);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        /* Grid */
        main {
            flex: 1;
            padding: 3rem 5%;
            display: flex;
            flex-direction: column;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        /* Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(30, 30, 38, 0.6);
            border-color: rgba(198, 255, 0, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 20px var(--accent-glow);
        }

        .card:hover::before { opacity: 1; }

        .card-image-wrapper {
            background: radial-gradient(circle at center, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
            border-radius: 16px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 6rem;
            transition: background 0.5s ease;
            padding: 1rem;
            overflow: hidden;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 20px 15px rgba(0,0,0,0.5));
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .card:hover .card-image-wrapper img {
            transform: scale(1.15) rotate(-5deg);
        }

        .card:hover .card-image-wrapper {
            background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 70%);
        }

        .card-brand {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.5rem;
        }

        .card-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
        }

        .btn-buy {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .card:hover .btn-buy {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-buy:active { transform: scale(0.95); }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 4rem;
        }

        .page-dot {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            font-weight: 600;
        }

        .page-dot:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .page-dot.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 1rem;
        }

        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-content {
            background: rgba(15, 15, 18, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            transform: translateY(30px) scale(0.98);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }

        .modal-gallery {
            background: radial-gradient(circle at center, rgba(198, 255, 0, 0.08) 0%, transparent 80%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10rem;
            padding: 4rem;
            border-right: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .modal-gallery img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 30px 30px rgba(0,0,0,0.6));
            animation: floatImg 6s infinite ease-in-out alternate;
        }

        @keyframes floatImg {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-10px) rotate(-2deg); }
        }

        .modal-info {
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .btn-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .btn-close:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            transform: rotate(90deg);
        }

        .modal-brand { color: var(--text-muted); letter-spacing: 4px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; }
        .modal-title { font-size: 2.5rem; font-weight: 800; margin: 0.5rem 0 1.5rem; line-height: 1.1; font-family: 'Syncopate', sans-serif; letter-spacing: -2px;}
        .modal-desc { color: var(--text-muted); line-height: 1.8; margin-bottom: 2.5rem; font-size: 1.05rem; }
        .modal-price { font-size: 2.5rem; font-weight: 800; margin-bottom: 2.5rem; color: var(--accent); }

        .modal-actions { display: flex; gap: 1rem; margin-top: auto; }
        
        .btn-wpp, .btn-cart {
            flex: 1;
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-wpp { background: #fff; color: #000; }
        .btn-wpp:hover { background: #e0e0e0; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .btn-cart { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn-cart:hover { background: var(--accent-hover); transform: translateY(-4px); box-shadow: 0 15px 40px rgba(198, 255, 0, 0.4); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Responsive */
        @media (max-width: 900px) {
            .modal-content { grid-template-columns: 1fr; max-height: 95vh; }
            .modal-gallery { font-size: 8rem; padding: 3rem; border-right: none; border-bottom: 1px solid var(--glass-border); height: 35vh; }
            .modal-info { padding: 2rem; }
            .modal-title { font-size: 1.8rem; }
        }

        @media (max-width: 600px) {
            header { flex-direction: column; padding: 1rem; gap: 1rem; }
            .search-container { max-width: 100%; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
            .card { padding: 1rem; border-radius: 20px; }
            .card-image-wrapper { height: 160px; font-size: 4rem; }
            .card-title { font-size: 1.1rem; }
            .card-price { font-size: 1.2rem; }
            .btn-buy { padding: 0.5rem 1rem; font-size: 0.9rem; }
            .modal-actions { flex-direction: column; }
            .btn-close { top: 1rem; right: 1rem; width: 36px; height: 36px; }
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 5rem 1rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Image count badge */
        .image-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: #000;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 2;
        }

        /* Carousel Gallery */
        .modal-gallery-carousel {
            position: relative;
            background: radial-gradient(circle at center, rgba(198, 255, 0, 0.08) 0%, transparent 80%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-right: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .carousel-container {
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel-slide {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 30px 30px rgba(0,0,0,0.6));
            animation: floatImg 6s infinite ease-in-out alternate;
        }

        .carousel-thumbnails {
            display: flex;
            gap: 8px;
            margin-top: 1rem;
            overflow-x: auto;
            padding: 0.5rem;
            max-width: 100%;
        }

        .thumbnail {
            min-width: 50px;
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.05);
        }

        .thumbnail:hover {
            border-color: rgba(198, 255, 0, 0.3);
        }

        .thumbnail.active {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 3;
        }

        .carousel-btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }

        .image-indicator {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 1rem 0;
        }

        .current-image {
            color: var(--accent);
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .modal-content { grid-template-columns: 1fr; max-height: 95vh; }
            .modal-gallery-carousel { 
                font-size: 8rem; 
                padding: 1.5rem; 
                border-right: none; 
                border-bottom: 1px solid var(--glass-border); 
                height: 40vh; 
            }
            .carousel-container { height: 250px; }
            .modal-info { padding: 2rem; }
            .modal-title { font-size: 1.8rem; }
        }

        @media (max-width: 600px) {
            header { flex-direction: column; padding: 1rem; gap: 1rem; }
            .search-container { max-width: 100%; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
            .card { padding: 1rem; border-radius: 20px; }
            .card-image-wrapper { height: 160px; font-size: 4rem; }
            .card-title { font-size: 1.1rem; }
            .card-price { font-size: 1.2rem; }
            .btn-buy { padding: 0.5rem 1rem; font-size: 0.9rem; }
            .modal-actions { flex-direction: column; }
            .btn-close { top: 1rem; right: 1rem; width: 36px; height: 36px; }
            .carousel-thumbnails { 
                justify-content: center;
                flex-wrap: wrap;
                max-width: 200px;
                margin: 0 auto;
            }
            .thumbnail { width: 40px; height: 40px; min-width: 40px; }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>

    <div class="app-container">
        <header>
            <div class="logo">STREETMOOD</div>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Procurar drops, collabs..." autocomplete="off">
            </div>
        </header>

        <main>
            <div class="product-grid" id="productGrid"></div>
            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        let allProducts = [];
        let filteredProducts = [];
        let currentPage = 1;
        const itemsPerPage = 12;

        const grid = document.getElementById('productGrid');
        const pagination = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');

        async function initData() {
            try {
                const response = await fetch('products.json');
                if (!response.ok) throw new Error('Local load failed');
                const data = await response.json();
                allProducts = Object.values(data);
            } catch (error) {
                console.warn('❗ Falha ao buscar products.json → usando fallback');
                const brands = ['OFF-WHITE', 'TRAVIS SCOTT', 'BALENCIAGA', 'YEEZY', 'NIKE SB'];
                const imagesFallback = ['streetm00d_.jpeg', 'sneaker1.jpg', 'sneaker2.png', 'model.jpg'];
                allProducts = Array.from({length: 36}, (_, i) => ({
                    id: i + 1,
                    brand: brands[i % brands.length],
                    name: `${brands[i % brands.length]} x EXCLUSIVE ${i+1}`,
                    price: (Math.random() * 800 + 200).toFixed(2),
                    images: [imagesFallback[i % imagesFallback.length]],
                    description: `Edição super limitada do drop de Inverno 26. Construção em materiais refletivos, design desconstruído.` 
                }));
            }
            
            filteredProducts = [...allProducts];
            renderProducts();
            renderPagination();
        }

        const renderProducts = () => {
            grid.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedItems = filteredProducts.slice(start, end);

            if (paginatedItems.length === 0) {
                grid.innerHTML = `<div class="no-results">Nenhum drop encontrado para sua busca. 💀</div>`;
                return;
            }

            paginatedItems.forEach(product => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(product);
                
                const firstImage = product.images && product.images.length > 0 
                    ? `imagens_produtos/${product.images[0]}` 
                    : `imagens_produtos/default.jpg`;
                const fallbackEmoji = `this.onerror=null; this.parentElement.innerHTML='👟';`;

                card.innerHTML = `
                    <div class="card-image-wrapper">
                        <img src="${firstImage}" alt="${product.name}" onerror="${fallbackEmoji}">
                        ${product.images && product.images.length > 1 ? `<div class="image-count">+${product.images.length - 1}</div>` : ''}
                    </div>
                    <div class="card-brand">${product.brand || 'STREETMOOD'}</div>
                    <div class="card-title">${product.name}</div>
                    <div class="card-footer">
                        <div class="card-price">€ ${product.price}</div>
                        <button class="btn-buy" onclick="event.stopPropagation(); openModal(${JSON.stringify(product).replace(/"/g, '&quot;')})">🔍</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        const renderPagination = () => {
            pagination.innerHTML = '';
            const pageCount = Math.ceil(filteredProducts.length / itemsPerPage);
            if (pageCount <= 1) return;

            for (let i = 1; i <= pageCount; i++) {
                const dot = document.createElement('div');
                dot.className = `page-dot ${currentPage === i ? 'active' : ''}`;
                dot.innerText = i;
                dot.onclick = () => {
                    currentPage = i;
                    renderProducts();
                    renderPagination();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                pagination.appendChild(dot);
            }
        };

        const openModal = (product) => {
            const images = product.images || [];
            const hasMultipleImages = images.length > 1;
            
            let galleryHTML = '';
            if (hasMultipleImages) {
                galleryHTML = `
                    <div class="modal-gallery-carousel">
                        <div class="carousel-container">
                            <div class="carousel-slide active">
                                <img src="imagens_produtos/${images[0]}" alt="${product.name}" onerror="this.parentElement.innerHTML='👟';">
                            </div>
                        </div>
                        <div class="carousel-thumbnails">
                            ${images.map((img, index) => `
                                <div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="changeImage(${index})">
                                    <img src="imagens_produtos/${img}" alt="${product.name} ${index + 1}" onerror="this.parentElement.innerHTML='👟';">
                                </div>
                            `).join('')}
                        </div>
                        <button class="carousel-btn prev" onclick="prevImage()">‹</button>
                        <button class="carousel-btn next" onclick="nextImage()">›</button>
                    </div>
                `;
            } else {
                const singleImage = images.length > 0 ? images[0] : 'default.jpg';
                galleryHTML = `
                    <div class="modal-gallery">
                        <img src="imagens_produtos/${singleImage}" alt="${product.name}" onerror="this.parentElement.innerHTML='👟';">
                    </div>
                `;
            }

            modalContent.innerHTML = `
                ${galleryHTML}
                <div class="modal-info">
                    <button class="btn-close" onclick="closeModal()">✕</button>
                    <div class="modal-brand">${product.brand || 'STREETMOOD'}</div>
                    <h2 class="modal-title">${product.name}</h2>
                    <div class="modal-price">€ ${product.price}</div>
                    <p class="modal-desc">${product.description || 'Sneaker exclusivo disponível agora.'}</p>
                    ${hasMultipleImages ? `<div class="image-indicator"><span class="current-image">1</span> / ${images.length}</div>` : ''}
                    <div class="modal-actions">
                        <button class="btn-cart" onclick="buyProduct('${product.name}', ${product.price})">🛒 Comprar</button>
                        <button class="btn-wpp" onclick="contactWhatsApp('${product.name}', ${product.price})">💬 WhatsApp</button>
                    </div>
                </div>
            `;
            
            // Store current product and images for carousel
            window.currentProduct = product;
            window.currentImages = images;
            window.currentImageIndex = 0;
            
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        const closeModal = () => {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        };

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const query = e.target.value.toLowerCase();
                filteredProducts = allProducts.filter(p => 
                    (p.name && p.name.toLowerCase().includes(query)) || 
                    (p.brand && p.brand.toLowerCase().includes(query))
                );
                currentPage = 1;
                renderProducts();
                renderPagination();
            }, 250);
        });

        // Carousel functions
        function changeImage(index) {
            if (!window.currentImages || window.currentImages.length <= index) return;
            
            window.currentImageIndex = index;
            const carouselSlide = document.querySelector('.carousel-slide img');
            const thumbnails = document.querySelectorAll('.thumbnail');
            const indicator = document.querySelector('.current-image');
            
            if (carouselSlide) {
                carouselSlide.src = `imagens_produtos/${window.currentImages[index]}`;
            }
            
            thumbnails.forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
            
            if (indicator) {
                indicator.textContent = index + 1;
            }
        }
        
        function nextImage() {
            if (!window.currentImages) return;
            const nextIndex = (window.currentImageIndex + 1) % window.currentImages.length;
            changeImage(nextIndex);
        }
        
        function prevImage() {
            if (!window.currentImages) return;
            const prevIndex = (window.currentImageIndex - 1 + window.currentImages.length) % window.currentImages.length;
            changeImage(prevIndex);
        }
        
        // Product action functions
        function buyProduct(name, price) {
            const message = `Olá STREETMOOD 👟 quero comprar o ${name} ainda está disponível?`;
            window.open(`https://ig.me/m/streetm00d_?text=${encodeURIComponent(message)}`, '_blank');
        }
        
        function contactWhatsApp(name, price) {
            const message = `Olá STREETMOOD 👟 vi o vosso catálogo e gostaria de saber mais sobre ${name}. Podem ajudar-me?`;
            window.open(`https://wa.me/351929461628?text=${encodeURIComponent(message)}`, '_blank');
        }
        
        // Initialize application data
        window.addEventListener('DOMContentLoaded', initData);
        
        // Make carousel functions global
        window.changeImage = changeImage;
        window.nextImage = nextImage;
        window.prevImage = prevImage;
        window.buyProduct = buyProduct;
        window.contactWhatsApp = contactWhatsApp;
    </script>
</body>
</html>
